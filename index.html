<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Página simples de apresentação — aplicação publicada na nuvem (Vercel)." />
  <title>Aplicação Cloud • Isaac Costa</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    :root{
      --bg1:#0b1020;
      --bg2:#111b3a;
      --card:#0f172a;
      --text:#e5e7eb;
      --muted:#a7b0c0;
      --border: rgba(255,255,255,.10);
      --accent:#60a5fa;
      --accent2:#34d399;
      --shadow: 0 18px 50px rgba(0,0,0,.45);
      --radius: 18px;
    }


    @media (prefers-color-scheme: light){
      :root{
        --bg1:#eef2ff;
        --bg2:#e0f2fe;
        --card:#ffffff;
        --text:#0f172a;
        --muted:#475569;
        --border: rgba(2,6,23,.10);
        --accent:#2563eb;
        --accent2:#059669;
        --shadow: 0 16px 40px rgba(2,6,23,.10);
      }
    }

    *{ box-sizing: border-box; }
    html,body{ height: 100%; }

    body{
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 700px at 15% 20%, rgba(96,165,250,.35), transparent 60%),
        radial-gradient(900px 600px at 85% 75%, rgba(52,211,153,.28), transparent 55%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      display: grid;
      place-items: center;
      padding: 28px 16px;
    }

    .container{
      width: min(880px, 100%);
    }

    .card{
      background: color-mix(in srgb, var(--card) 92%, transparent);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .header{
      padding: 26px 26px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .title-wrap{
      display: grid;
      gap: 6px;
      min-width: 260px;
    }

    h1{
      margin: 0;
      font-size: clamp(1.35rem, 2vw + 1rem, 2.05rem);
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    .subtitle{
      margin: 0;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .badge{
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255,255,255,.04);
      color: var(--text);
      font-weight: 600;
      font-size: 0.92rem;
      user-select: none;
      white-space: nowrap;
    }

    .dot{
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 0 0 5px rgba(96,165,250,.15);
    }

    .content{
      padding: 22px 26px 26px;
      display: grid;
      gap: 16px;
    }

    .grid{
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 640px){
      .grid{ grid-template-columns: 1fr; }
    }

    .info{
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 14px;
      background: rgba(255,255,255,.03);
      display: grid;
      gap: 6px;
    }

    .label{
      font-size: 0.86rem;
      color: var(--muted);
    }

    .value{
      font-size: 1.03rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .note{
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 0.98rem;
    }

    .actions{
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    a.button{
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 11px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      text-decoration: none;
      color: var(--text);
      font-weight: 700;
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
      background: rgba(255,255,255,.04);
    }

    a.button.primary{
      border-color: color-mix(in srgb, var(--accent) 55%, var(--border));
      background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 28%, transparent), rgba(255,255,255,.04));
    }

    a.button:hover{
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--accent) 45%, var(--border));
      background: rgba(255,255,255,.06);
    }

    .footer{
      padding: 16px 26px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .sr-only{
      position:absolute;
      width:1px;height:1px;
      padding:0;margin:-1px;
      overflow:hidden;clip:rect(0,0,0,0);
      white-space:nowrap;border:0;
    }
  </style>
</head>

<body>
  <main class="container">
    <section class="card" aria-labelledby="titulo">
      <header class="header">
        <div class="title-wrap">
          <h1 id="titulo">Minha aplicação publicada na nuvem</h1>
          <p class="subtitle">Página de apresentação do projeto (deploy na Vercel).</p>
        </div>

        <div class="badge" aria-label="Status de publicação">
          <span class="dot" aria-hidden="true"></span>
          Publicado com sucesso
        </div>
      </header>

      <div class="content">
        <div class="grid" role="list">
          <div class="info" role="listitem">
            <div class="label">Aluno</div>
            <div class="value">Isaac Costa</div>
          </div>

          <div class="info" role="listitem">
            <div class="label">Curso</div>
            <div class="value">Informática</div>
          </div>

          <div class="info" role="listitem">
            <div class="label">Plataforma de deploy</div>
            <div class="value">Vercel</div>
          </div>

          <div class="info" role="listitem">
            <div class="label">Objetivo</div>
            <div class="value">Publicação na nuvem</div>
          </div>
        </div>

        <div class="actions" aria-label="Ações">

          <a class="button primary" href="https://github.com/IsaacCosta23/atividade-cloud" onclick=" target="_blank">Ver projeto</a>
          <a class="button" href="https://github.com/IsaacCosta23/atividade-cloud" target="_blank">Repositório</a>
        </div>
      </div>

      <footer class="footer">
        <span>© <span id="year"></span> • Isaac Costa</span>
        <span>Hospedado na Vercel</span>
      </footer>
    </section>
  </main>

  <script>

    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
